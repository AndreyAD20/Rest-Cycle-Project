<!doctype html>
<html lang="es">
 <head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1" />
   <title>Rest Cycle </title>
    <link rel="stylesheet" href="estadisticas.css" />
    
</head>
  <body>
   <div class="APP">
    <!-- Agregar este botón al inicio del div.App -->
        <button class="back-button" onclick="window.location.href=':/interfaz_hijo.html'">
            &#8592;
       </button>
    <!-- Esfera flotante existente -->
    <div class="floating-sphere">
        <img src="LogoBuho.png" alt="Imagen esfera" class="sphere-image">
    </div>

    <!-- Nueva esfera flotante -->
    <div class="floating-sphere-second">
         <p> Aqui puedes ver las estadisticas del uso de tus apps</p> 
    </div>
     <!-- Reemplaza el img y p2 existentes con esto -->
<div class="alert-bubble">
    <img src="Alerta.png" alt="Alerta"/>
    <p>Advertencia, el uso de las redes sociales en exceso es perjudicial para el desarrollo cognitivo.</p>
</div>
      <button class="button">Diario</button>
      <button class="button">Semanal</button>
      <button class="button">Mensual</button>

      <div class="stats-container">

    <!-- Barras de estadísticas -->
    <div class="stat-bar">
        <span class="stat-label">TikTok</span>
        <div class="bar-container">
            <div class="bar bar-1" style="width: 75%;"></div>
        </div>
        <span class="time-used">3h 45m</span>
    </div>
    <div class="stat-bar">
        <span class="stat-label">Instagram</span>
        <div class="bar-container">
            <div class="bar bar-2" style="width: 60%;"></div>
        </div>
        <span class="time-used">2h 30m</span>
    </div>
    <div class="stat-bar">
        <span class="stat-label">WhatsApp</span>
        <div class="bar-container">
            <div class="bar bar-3" style="width: 85%;"></div>
        </div>
        <span class="time-used">4h 15m</span>
    </div>
    <div class="stat-bar">
        <span class="stat-label">Facebook</span>
        <div class="bar-container">
            <div class="bar bar-4" style="width: 45%;"></div>
        </div>
        <span class="time-used">1h 45m</span>
    </div>
    <div class="stat-bar">
        <span class="stat-label">Twitter</span>
        <div class="bar-container">
            <div class="bar bar-5" style="width: 30%;"></div>
        </div>
        <span class="time-used">1h 15m</span>
    </div>
</div>
   
 </body>
</html>
