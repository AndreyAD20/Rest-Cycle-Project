<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rest Cycle </title>
    <link rel="stylesheet" href="calendario.css" />
    <script src="calendario.js"></script>
</head>
<body>
    <div class="APP">
         <!-- Agregar este botón al inicio del div.App -->
        <button class="back-button" onclick="window.location.href='../interfaz_hijo.html'">
            &#8592;
       </button>
        <div class="calendar-container">
            <!-- Encabezado del calendario -->
            <div class="calendar-header">
                <button class="nav-btn" id="prevBtn">‹</button>
                <div class="month-year" id="monthYear"></div>
                <button class="nav-btn" id="nextBtn">›</button>
            </div>

            <!-- Grid del calendario -->
            <div class="calendar-grid" id="calendarGrid"></div>

            <!-- Panel de eventos-->
            <div class="event-panel" id="eventPanel" style="display: none;">
                <h3 id="eventDate"></h3>
                <ul class="event-list" id="eventList"></ul>
                <div class="add-event">
                    <input type="text" id="eventInput" placeholder="Agregar evento...">
                    <button onclick="addEvent()">Agregar</button>
                </div>
            </div>
        </div>

        <div class="floating-sphere">
         <img src="LogoBuho.png" alt="Imagen esfera" class="sphere-image">
        </div>
        <div class="floating-sphere-second">
         <p>Asegurate aqui que tus compromisos esten anotados y organizados</p>
        </div>
    </div>
</body>
</html>
