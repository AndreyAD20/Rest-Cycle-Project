<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios</title>
    <link rel="stylesheet" href="../../../../rest_cycle.css">
    <link rel="stylesheet" href="horariosHijo.css">
</head>
<body>
    <div class="App">
        <img src="../../../../img/Volver.svg" alt="" class="volver" onclick="window.location.href='../principalPadre.html'">
        <span>
            <img src="../../../../img/LogoBuho.svg" alt="">
            <p>Aqui puedes establecer horas para bloquear el dispositivo de tu hijo</p>
        </span>
        <img class="luna" src="../../../../img/Luna.svg" alt="">
        <div class="container">
            <span class="horario">
                <h2>Horario 1</h2>
                <img src="../../../../img/Configurcion.svg" alt=""> 
            </span>   
            <p>10:00 pm - 06:00 am</p>
            <h3>Dias activos</h3>
            <span class="dias">
                <button class="dia">L</button>
                <button class="dia">M</button>
                <button class="dia">M</button>
                <button class="dia">J</button>
                <button class="dia">V</button>
                <button class="dia">S</button>
                <button class="dia">D</button>
            </span>
        </div>
        <div class="container">
            <span class="horario">
                <h2>Horario 2</h2>
                <img src="../../../../img/Configurcion.svg" alt=""> 
            </span>   
            <p>03:00 pm - 05:00 pm</p>
            <h3>Dias activos</h3>
            <span class="dias">
                <button class="dia">L</button>
                <button class="dia">M</button>
                <button class="dia">M</button>
                <button class="dia">J</button>
                <button class="dia">V</button>
                <button class="dia">S</button>
                <button class="dia">D</button>
            </span>
        </div>
        <span id="AgregarHorario" onclick="window.location.href='Configurar Horario/configuracionHorario.html'">
            <h2>Agregar Horario</h2>
            <img src="../../../../img/Agregar1.svg" alt="">
        </span>
        

    </div>
    
</body>
</html>
