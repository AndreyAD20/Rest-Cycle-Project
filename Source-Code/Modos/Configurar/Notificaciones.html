<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones</title>
    <link rel="stylesheet" href="colores.css">
</head>
<body> 
    <div class="App">
        <!-- Agregar este botón al inicio del div.App -->
        <button class="back-button" onclick="window.location.href='configuracion.html'">
            &#8592;
        </button>
        <div id="Notificaciones">
        
        
        <!-- Primer select para Tono de Notificaciones -->
        <div class="config-item">
            <span class="config-text">Tono de Notificaciones</span>
            <select class="tone-select" id="notificationTone">
                <option value="tono1">Tono 1</option>
                <option value="tono2">Musica</option>
                
            </select>
        </div>

        <!-- Segundo select para Vibración -->
        <div class="config-item">
            <span class="config-text">Vibración</span>
            <select class="tone-select" id="notificationVibration">
                <option value="vibracion1">Desactivada</option>
                <option value="vibracion2">Predeterminada</option>
                <option value="vibracion3">Corta</option>
                <option value="vibracion4">Larga</option>
            </select>
        </div>
        <div class="config-item">
                <span class="config-text">Alta Prioridad</span>
                <label class="switch">
                    <input type="checkbox" id="altaPrioridad">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="config-item">
                <span class="config-text">Recordatorios</span>
                <label class="switch">
                    <input type="checkbox" id="recordatorios">
                    <span class="slider"></span>
                </label>
            </div>
    </div>
</body>
</html>
