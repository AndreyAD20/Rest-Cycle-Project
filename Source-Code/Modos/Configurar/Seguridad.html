<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEGURIDAD</title>
    <link rel="stylesheet" href="colores.css">
</head>
<body>
    <div class="App">
        <!-- Botón de retroceso -->
        <button class="back-button" onclick="window.location.href='configuracion.html'">
            &#8592;
        </button>
        <div id="Seguridad">

        <!-- Esfera flotante y mensaje -->
        <div class="floating-sphere security-sphere">
            <img src="esfera.png" alt="Imagen esfera" class="sphere-image">
        </div>
        <div class="speech-bubble security-bubble">
            <p>Manten tus Contraseñas Actualizadas</p>
        </div>

        <!-- Contenido principal -->
        <div id="Seguridad">
            <span class="config-text">Contraseña Actual</span>
            <div class="input-container">
                <input type="text" class="custom-input" placeholder="Ingrese Contraseña Actual">
            </div>

            <span class="config-text">Nueva Contraseña</span>
            <div class="input-container">
                <input type="text" class="custom-input" placeholder="Ingrese Nueva Contraseña">
            </div>

            <div class="confirm-container">
                <button class="confirm-button">Confirmar</button>
            </div>
            <span class="config-text">Contraseña Vinculo Actual</span>
            <div class="input-container">
                <input type="text" class="custom-input" placeholder="Ingrese Contraseña Segura Actual">
            </div>

                <span class="config-text">Nueva Contraseña Vinculo</span>
            <div class="input-container">
                <input type="text" class="custom-input" placeholder="Ingrese Nueva Contraseña">
            </div>
                <div class="confirm-container">
                <button class="confirm-button">Confirmar</button>
            </div>
        </div>
     </div>
    </div>
</body>
</html>
